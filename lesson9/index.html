<!--Homework 9-->
<script>
    let ladder = {
        step: 0,

        up() {
            this.step++;
            return this;
        },

        down() {
            this.step--;
            return this;
        },

        showStep() {
            console.log(this.step);
            return this;
        }
    };

    ladder.up().up().up().down().showStep().up().up().down().showStep();
</script>
