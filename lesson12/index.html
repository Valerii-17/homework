<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
<!--Homework 12.1-->
<div id="app">
    <button class="direction">Please enter address</button>
    <button class="send">Go there</button>
</div>

<script>
    const directionBtn = document.querySelector(".direction");
    const sendBtn = document.querySelector(".send");

    let url = "";

    directionBtn.addEventListener("click", function () {
        url = prompt("Enter address:");
    });

    sendBtn.addEventListener("click", function () {
        if (!url) {
            alert("Please enter a valid address!");
            return;
        }

        if (!url.startsWith("http://") && !url.startsWith("https://")) {
            url = "https://" + url;
        }

        window.location.href = url;
    });

</script>


<!--Homework 12.2-->
<div id="parent">
    <button class="btn1">Button1</button>
    <button class="btn1">Button2</button>
    <button class="btn1">Button3</button>
</div>
<script>
    const parent = document.querySelector("#parent");
    parent.addEventListener("click", function (event) {
        if (event.target.tagName === "BUTTON") {
            const clickedItem = event.target.textContent;
            alert("Click was on:" + clickedItem);
        }
    })
</script>


<!--Homework 12.3-->
<div class="todo">
    <ul class="todo-list">
        <li>
            Task 1
            <button class="delete-btn">Delete</button>
        </li>
        <li>
            Task 2
            <button class="delete-btn">Delete</button>
        </li>
        <li>
            Task 3
            <button class="delete-btn">Delete</button>
        </li>
    </ul>

    <input class="todo-input" placeholder="Add new task please" type="text">
    <button class="add-btn">Add task</button>
</div>
<script>
    const list = document.querySelector(".todo-list");
    const input = document.querySelector(".todo-input");
    const addBtn = document.querySelector(".add-btn");


    list.addEventListener("click", function (event) {
        if (event.target.classList.contains("delete-btn")) {
            event.target.parentElement.remove();
        }
    });

    addBtn.addEventListener("click", function () {
        const taskText = input.value.trim();

        if (taskText === "") {
            return;
        }

        const li = document.createElement("li");

        const text = document.createElement("span");
        text.textContent = taskText;

        const btn = document.createElement("button");
        btn.textContent = "Delete";
        btn.classList.add("delete-btn");

        li.appendChild(text);
        li.appendChild(btn);

        list.appendChild(li);
        input.value = "";

    });
</script>
</body>
</html>
