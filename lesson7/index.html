<!--Homework 7.1-->
<script>
    function removeSymb(str, symb) {
        let result = "";

        for (let i = 0; i < str.length; i++) {
            if (!symb.includes(str[i])) {
                result += str[i];
            }
        }

        return result;
    }

    let text = prompt("Enter string please:");
    let symbInput = prompt("Enter symbols to be removed:");

    let symb = symbInput.split("");

    let result = removeSymb(text, symb);

    console.log("Result:", result);


</script>

<!--Homework 7.2-->
<script>
    function getAverage(arr) {
        let sum = 0;
        let count = 0;

        for (let i = 0; i < arr.length; i++) {
            if (typeof arr[i] === "number") {
                sum += arr[i];
                count++;
            }
        }

        return count > 0 ? sum / count : 0;
    }

    let arr = [25, true, 40, "hello", `string`, 50];

    let result = getAverage(arr);

    console.log(result);

</script>

<!--Homework 7.3-->
<script>
    function removeElement(array, item) {
        for (let i = 0; i < array.length; i++) {
            if (array[i] === item) {
                array.splice(i, 1);
                i--;
            }
        }
    }

    const array = [1, "1", 2, 1, true, 1, false];

    removeElement(array, 1);

    console.log(array);


</script>
